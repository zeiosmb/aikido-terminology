title: Aikido Terminology
description: Glossary of Japanese aikido terms, techniques, and concepts
url: https://zeiosmb.github.io
baseurl: /aikido-terminology
lang: en

remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme

color_scheme: light

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

heading_anchors: true

aux_links:
  "View on GitHub":
    - "https://github.com/zeiosmb/aikido-terminology"

back_to_top: true
back_to_top_text: "↑ Back to top"

markdown: kramdown
kramdown:
  input: GFM

exclude:
  - README.md
  - vocab.md
  - Gemfile
  - Gemfile.lock
